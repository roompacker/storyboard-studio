<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StoryBoard Studio - AI 영상 자동화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== 리셋 & 기본 ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1a1a24;
  --border:#2a2a3a;
  --accent:#00e5a0;
  --accent2:#00b8ff;
  --accent-glow:rgba(0,229,160,0.15);
  --text:#e8e8f0;
  --text2:#8888a0;
  --danger:#ff4466;
  --warning:#ffaa00;
  --radius:14px;
}
html,body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
/* ===== 배경 효과 ===== */
body::before{
  content:'';position:fixed;top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%,rgba(0,229,160,0.04) 0%,transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(0,184,255,0.03) 0%,transparent 50%);
  z-index:0;pointer-events:none;
  animation:bgFloat 20s ease-in-out infinite alternate;
}
@keyframes bgFloat{
  0%{transform:translate(0,0) rotate(0deg)}
  100%{transform:translate(-3%,3%) rotate(2deg)}
}
/* ===== 레이아웃 ===== */
.app{
  position:relative;z-index:1;
  max-width:480px;margin:0 auto;
  padding:16px 16px 100px;
}
/* ===== 헤더 ===== */
.header{
  text-align:center;padding:24px 0 20px;
}
.header .logo{
  font-family:'Space Mono',monospace;
  font-size:11px;letter-spacing:4px;
  color:var(--accent);text-transform:uppercase;
  margin-bottom:6px;
}
.header h1{
  font-size:22px;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.3;
}
.header .sub{
  font-size:12px;color:var(--text2);margin-top:4px;
}
/* ===== 카드 ===== */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
  transition:border-color 0.3s;
}
.card:focus-within{border-color:var(--accent)}
.card-title{
  font-size:13px;font-weight:700;
  color:var(--accent);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.card-title .num{
  width:22px;height:22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:6px;display:flex;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:var(--bg);
}
/* ===== 입력 필드 ===== */
.input-group{margin-bottom:12px}
.input-group label{
  display:block;font-size:11px;
  color:var(--text2);margin-bottom:6px;
  font-weight:500;
}
.input-group input,
.input-group select,
.input-group textarea{
  width:100%;padding:12px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-size:14px;font-family:inherit;
  outline:none;transition:border-color 0.3s;
}
.input-group input:focus,
.input-group select:focus,
.input-group textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.input-group textarea{
  min-height:140px;resize:vertical;
  line-height:1.7;
}
.input-group .hint{
  font-size:10px;color:var(--text2);
  margin-top:4px;
}
/* ===== API 키 표시 ===== */
.api-input-wrap{position:relative}
.api-input-wrap input{padding-right:44px}
.api-toggle{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;
  color:var(--text2);font-size:16px;
  cursor:pointer;padding:4px;
}
/* ===== 설정 행 ===== */
.settings-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;
}
/* ===== 버튼 ===== */
.btn{
  width:100%;padding:14px;
  border:none;border-radius:10px;
  font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:all 0.3s;position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(0.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--bg);
}
.btn-primary:disabled{
  opacity:0.4;cursor:not-allowed;
  transform:none;
}
.btn-secondary{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
}
.btn-danger{
  background:rgba(255,68,102,0.1);
  border:1px solid rgba(255,68,102,0.3);
  color:var(--danger);
}
.btn-download{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;
}
/* ===== 진행 상태 ===== */
.progress-bar{
  width:100%;height:6px;
  background:var(--surface2);
  border-radius:3px;overflow:hidden;
  margin:12px 0;
}
.progress-bar .fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width 0.5s ease;
  width:0%;
}
.status-text{
  font-size:12px;color:var(--text2);
  text-align:center;min-height:18px;
  margin-bottom:8px;
}
/* ===== 스토리보드 ===== */
.scene-list{display:flex;flex-direction:column;gap:12px}
.scene-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  transition:border-color 0.3s;
}
.scene-item.generating{
  border-color:var(--warning);
  animation:pulse 1.5s ease-in-out infinite;
}
.scene-item.done{border-color:var(--accent)}
.scene-item.error{border-color:var(--danger)}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,170,0,0.2)}
  50%{box-shadow:0 0 0 6px rgba(255,170,0,0)}
}
.scene-header{
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
}
.scene-num{
  width:28px;height:28px;flex-shrink:0;
  background:var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text);
}
.scene-item.done .scene-num{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--bg);
}
.scene-info{flex:1;min-width:0}
.scene-info .desc{
  font-size:13px;font-weight:500;
  line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.scene-info .prompt-text{
  font-size:10px;color:var(--text2);
  margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:1;
  -webkit-box-orient:vertical;overflow:hidden;
}
.scene-img-wrap{
  width:100%;aspect-ratio:16/9;
  background:var(--bg);position:relative;
  display:flex;align-items:center;justify-content:center;
}
.scene-img-wrap img{
  width:100%;height:100%;object-fit:cover;
}
.scene-img-wrap .placeholder{
  font-size:11px;color:var(--text2);
  text-align:center;padding:20px;
}
.scene-img-wrap .spinner{
  width:32px;height:32px;
  border:3px solid var(--border);
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== 에디터 모달 ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  z-index:100;display:none;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.active{display:flex}
.modal-content{
  width:100%;max-width:480px;
  max-height:85vh;overflow-y:auto;
  background:var(--surface);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 16px 30px;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
.modal-header{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{
  width:32px;height:32px;
  background:var(--surface2);border:none;
  border-radius:8px;color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
/* ===== 다운로드 섹션 ===== */
.download-section{margin-top:8px}
.download-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-top:10px;
}
.dl-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  cursor:pointer;transition:border-color 0.3s;
}
.dl-item:active{border-color:var(--accent)}
.dl-item img{
  width:100%;aspect-ratio:16/9;object-fit:cover;
}
.dl-item .dl-label{
  padding:6px 8px;font-size:10px;
  color:var(--text2);text-align:center;
}
/* ===== 토스트 ===== */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;padding:12px 20px;
  font-size:13px;z-index:200;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  transition:transform 0.3s ease;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.toast.error{border-color:var(--danger);color:var(--danger)}
/* ===== 숨김 ===== */
.hidden{display:none!important}
/* ===== 스크롤바 ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* ===== 예시 프리셋 ===== */
.preset-chips{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:10px;
}
.preset-chip{
  padding:6px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;font-size:11px;
  color:var(--text2);cursor:pointer;
  transition:all 0.2s;
}
.preset-chip:active{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-glow);
}
/* ===== 이미지 스타일 태그 ===== */
.style-tags{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:8px;
}
.style-tag{
  padding:5px 10px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;font-size:11px;
  color:var(--text2);cursor:pointer;
  transition:all 0.2s;
}
.style-tag.active{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-glow);
}
/* ===== 장면 수 컨트롤 ===== */
.scene-count-ctrl{
  display:flex;align-items:center;gap:10px;
}
.scene-count-ctrl button{
  width:36px;height:36px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.scene-count-ctrl span{
  font-size:20px;font-weight:700;
  min-width:30px;text-align:center;
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="logo">StoryBoard Studio</div>
    <h1>AI 영상 스토리보드<br>자동 생성기</h1>
    <div class="sub">대본 → 스토리보드 → 이미지 생성 → 다운로드</div>
  </div>

  <!-- STEP 1: API 설정 -->
  <div class="card" id="card-api">
    <div class="card-title"><span class="num">1</span> API 설정</div>
    <div class="input-group">
      <label>Gemini API Key</label>
      <div class="api-input-wrap">
        <input type="password" id="apiKey" placeholder="AIza... 형태의 키를 입력하세요">
        <button class="api-toggle" id="toggleKey">👁</button>
      </div>
      <div class="hint">
        Google AI Studio → <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">API 키 발급</a> 에서 무료 발급 가능
      </div>
    </div>
    <div class="settings-row">
      <div class="input-group">
        <label>텍스트 모델</label>
        <select id="textModel">
          <option value="gemini-2.5-flash">2.5 Flash (추천)</option>
          <option value="gemini-2.5-flash-lite">2.5 Flash-Lite</option>
        </select>
      </div>
      <div class="input-group">
        <label>이미지 모델</label>
        <select id="imageModel">
          <option value="gemini-2.5-flash-image">2.5 Flash Image (무료추천)</option>
          <option value="gemini-3.1-flash-image-preview">3.1 Flash Image (최신)</option>
          <option value="gemini-3-pro-image-preview">3 Pro Image (고품질/유료)</option>
        </select>
        <div class="hint">무료 API 키는 2.5 Flash Image 추천!</div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn btn-secondary" id="btnTestText" style="flex:1;padding:10px;font-size:12px">🔤 텍스트 API 테스트</button>
      <button class="btn btn-secondary" id="btnTestImage" style="flex:1;padding:10px;font-size:12px">🖼️ 이미지 API 테스트</button>
    </div>
    <div id="apiTestResult" style="font-size:12px;margin-top:8px;min-height:20px;color:var(--text2);text-align:center"></div>
  </div>
  <div class="card" id="card-script">
    <div class="card-title"><span class="num">2</span> 대본 입력</div>
    <div class="preset-chips">
      <span class="preset-chip" data-preset="economy">💰 경제학</span>
      <span class="preset-chip" data-preset="psychology">🧠 심리학</span>
      <span class="preset-chip" data-preset="history">📜 역사</span>
      <span class="preset-chip" data-preset="science">🔬 과학</span>
    </div>
    <div class="input-group">
      <label>영상 대본 또는 주제</label>
      <textarea id="scriptInput" placeholder="예: 사람들이 돈을 쓸 때 무의식적으로 반복하는 5가지 심리 패턴에 대해 설명하는 영상 대본을 작성해주세요..."></textarea>
    </div>
    <div class="settings-row">
      <div class="input-group">
        <label>장면 수</label>
        <div class="scene-count-ctrl">
          <button id="sceneDown">−</button>
          <span id="sceneCount">5</span>
          <button id="sceneUp">+</button>
        </div>
      </div>
      <div class="input-group">
        <label>이미지 비율</label>
        <select id="aspectRatio">
          <option value="16:9">16:9 (유튜브)</option>
          <option value="9:16">9:16 (쇼츠)</option>
          <option value="1:1">1:1 (정사각)</option>
        </select>
      </div>
    </div>
    <div class="input-group">
      <label>이미지 스타일</label>
      <div class="style-tags" id="styleTags">
        <span class="style-tag active" data-style="cinematic realistic photograph">📸 시네마틱</span>
        <span class="style-tag" data-style="digital illustration, clean vector art">🎨 일러스트</span>
        <span class="style-tag" data-style="dark moody anime style">🌙 다크 애니메</span>
        <span class="style-tag" data-style="3D rendered, Pixar style">🧊 3D 렌더</span>
        <span class="style-tag" data-style="watercolor painting, soft pastel">🖌️ 수채화</span>
        <span class="style-tag" data-style="minimalist flat design infographic">📊 인포그래픽</span>
      </div>
    </div>
  </div>

  <!-- STEP 3: 생성 버튼 -->
  <div class="card" id="card-generate">
    <button class="btn btn-primary" id="btnGenerate">🚀 스토리보드 생성하기</button>
    <div class="progress-bar hidden" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="status-text" id="statusText"></div>
  </div>

  <!-- STEP 4: 스토리보드 결과 -->
  <div class="card hidden" id="card-storyboard">
    <div class="card-title"><span class="num">3</span> 스토리보드 결과</div>
    <div class="scene-list" id="sceneList"></div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-primary" id="btnGenerateImages" style="flex:1">🎨 이미지 일괄 생성</button>
      <button class="btn btn-secondary" id="btnEditStoryboard" style="width:auto;padding:14px 18px">✏️</button>
    </div>
    <div class="progress-bar hidden" id="imgProgressBar"><div class="fill" id="imgProgressFill"></div></div>
    <div class="status-text" id="imgStatusText"></div>
  </div>

  <!-- STEP 5: 다운로드 -->
  <div class="card hidden" id="card-download">
    <div class="card-title"><span class="num">4</span> 다운로드</div>
    <div class="download-grid" id="downloadGrid"></div>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-download" id="btnDownloadAll">📦 전체 이미지 다운로드</button>
      <button class="btn btn-secondary" id="btnReset">🔄 처음부터 다시하기</button>
    </div>
  </div>

</div>

<!-- 장면 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ 장면 편집</h3>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div id="editModalBody"></div>
    <div style="margin-top:14px">
      <button class="btn btn-primary" id="btnSaveEdit">저장하기</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ===== 상태 관리 ===== */
const state = {
  apiKey: '',
  textModel: 'gemini-2.5-flash',
  imageModel: 'gemini-2.5-flash-image',
  sceneCount: 5,
  aspectRatio: '16:9',
  imageStyle: 'cinematic realistic photograph',
  scenes: [],       // [{desc, prompt, imageData, imageMime}]
  isGenerating: false
};

/* ===== DOM 요소 ===== */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

/* ===== 초기화 ===== */
document.addEventListener('DOMContentLoaded', () => {
  try {
    // localStorage에서 API 키 복원
    const savedKey = localStorage.getItem('sbs-apiKey');
    if (savedKey) {
      $('#apiKey').value = savedKey;
      state.apiKey = savedKey;
    }

    // 이벤트 바인딩
    setupEvents();
  } catch(e) {
    console.error('초기화 오류:', e);
  }
});

/* ===== 이벤트 설정 ===== */
function setupEvents() {
  try {
    // API 키 토글
    $('#toggleKey').addEventListener('click', () => {
      const inp = $('#apiKey');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    $('#toggleKey').addEventListener('touchend', (e) => e.preventDefault());

    // API 키 저장
    $('#apiKey').addEventListener('change', () => {
      state.apiKey = $('#apiKey').value.trim();
      localStorage.setItem('sbs-apiKey', state.apiKey);
    });

    // 모델 선택
    $('#textModel').addEventListener('change', () => {
      state.textModel = $('#textModel').value;
    });
    $('#imageModel').addEventListener('change', () => {
      state.imageModel = $('#imageModel').value;
      if (state.imageModel.includes('pro')) {
        showToast('⚠️ Pro 모델은 유료 등급 필요! 무료는 2.5 Flash 추천', 'error');
      } else if (state.imageModel.includes('3.1')) {
        showToast('💡 3.1 모델은 최신이지만 제한 있을 수 있어요', 'success');
      }
    });

    // 장면 수 조절
    $('#sceneDown').addEventListener('click', () => {
      if (state.sceneCount > 3) {
        state.sceneCount--;
        $('#sceneCount').textContent = state.sceneCount;
      }
    });
    $('#sceneUp').addEventListener('click', () => {
      if (state.sceneCount < 20) {
        state.sceneCount++;
        $('#sceneCount').textContent = state.sceneCount;
      }
    });

    // 비율 선택
    $('#aspectRatio').addEventListener('change', () => {
      state.aspectRatio = $('#aspectRatio').value;
    });

    // 스타일 태그
    $$('.style-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        $$('.style-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        state.imageStyle = tag.dataset.style;
      });
    });

    // 프리셋 칩
    $$('.preset-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        applyPreset(chip.dataset.preset);
      });
    });

    // 스토리보드 생성
    $('#btnGenerate').addEventListener('click', generateStoryboard);

    // 이미지 일괄 생성
    $('#btnGenerateImages').addEventListener('click', generateAllImages);

    // 편집 버튼
    $('#btnEditStoryboard').addEventListener('click', openEditModal);

    // 모달 닫기
    $('#closeModal').addEventListener('click', closeEditModal);
    $('#editModal').addEventListener('click', (e) => {
      if (e.target === $('#editModal')) closeEditModal();
    });

    // 편집 저장
    $('#btnSaveEdit').addEventListener('click', saveEdit);

    // 전체 다운로드
    $('#btnDownloadAll').addEventListener('click', downloadAll);

    // 리셋
    $('#btnReset').addEventListener('click', resetAll);

    // API 테스트 버튼
    $('#btnTestText').addEventListener('click', testTextAPI);
    $('#btnTestImage').addEventListener('click', testImageAPI);

  } catch(e) {
    console.error('이벤트 설정 오류:', e);
  }
}

/* ===== Gemini API 호출 (텍스트) ===== */
async function callGeminiText(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.textModel}:generateContent?key=${state.apiKey}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      temperature: 0.8,
      maxOutputTokens: 8192
    }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const msg = errData?.error?.message || '';
    if (res.status === 400) throw new Error('API 키가 잘못되었거나 모델을 사용할 수 없습니다. API 키를 확인해주세요.');
    if (res.status === 403) throw new Error('API 키 권한이 없습니다. Google AI Studio에서 키를 확인해주세요.');
    if (res.status === 429) throw new Error('API 호출 한도 초과! 잠시 후 다시 시도해주세요.');
    throw new Error(msg || `API 오류 (${res.status})`);
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) {
    const reason = data?.candidates?.[0]?.finishReason;
    if (reason === 'SAFETY') throw new Error('안전 필터에 의해 차단되었습니다. 대본 내용을 수정해주세요.');
    throw new Error('AI 응답이 비어있습니다. 다시 시도해주세요.');
  }
  return text;
}

/* ===== Gemini API 호출 (이미지 생성) ===== */
async function callGeminiImage(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.imageModel}:generateContent?key=${state.apiKey}`;

  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      responseModalities: ["TEXT", "IMAGE"]
    }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const msg = errData?.error?.message || '';
    if (res.status === 429 || msg.includes('Resource') || msg.includes('quota') || msg.includes('rate')) {
      throw new Error('API 한도 초과! 잠시 후 다시 시도');
    }
    if (res.status === 400 && (msg.includes('not found') || msg.includes('not supported'))) {
      throw new Error('이 이미지 모델은 무료에서 안 돼요. "2.5 Flash Image" 선택해주세요!');
    }
    if (res.status === 400 && msg.includes('API_KEY')) throw new Error('API 키가 올바르지 않습니다.');
    if (res.status === 403) throw new Error('API 키 권한이 없습니다.');
    throw new Error(msg || `이미지 API 오류 (${res.status})`);
  }

  const data = await res.json();
  
  // 안전 필터 체크
  const reason = data?.candidates?.[0]?.finishReason;
  if (reason === 'SAFETY') {
    throw new Error('안전 필터 차단. 프롬프트를 수정해주세요.');
  }
  
  const parts = data?.candidates?.[0]?.content?.parts || [];

  for (const part of parts) {
    if (part.inlineData) {
      return {
        data: part.inlineData.data,
        mimeType: part.inlineData.mimeType || 'image/png'
      };
    }
  }
  throw new Error('이미지가 생성되지 않았습니다. 다시 시도해주세요.');
}

/* ===== 스토리보드 생성 ===== */
async function generateStoryboard() {
  try {
    // 유효성 검사
    state.apiKey = $('#apiKey').value.trim();
    if (!state.apiKey) {
      showToast('API 키를 입력해주세요!', 'error');
      $('#apiKey').focus();
      return;
    }
    const script = $('#scriptInput').value.trim();
    if (!script) {
      showToast('대본 또는 주제를 입력해주세요!', 'error');
      $('#scriptInput').focus();
      return;
    }

    // 상태 전환
    state.isGenerating = true;
    $('#btnGenerate').disabled = true;
    $('#btnGenerate').textContent = '⏳ 생성 중...';
    $('#progressBar').classList.remove('hidden');
    setProgress('progressFill', 10);
    setStatus('statusText', '🤖 AI가 스토리보드를 구성하고 있어요...');

    // 프롬프트 구성
    const prompt = `당신은 유튜브 영상 스토리보드 전문가입니다.
아래 대본/주제를 분석해서 정확히 ${state.sceneCount}개의 장면(scene)으로 나누고,
각 장면에 대해 영상에 사용할 이미지 프롬프트를 만들어주세요.

[대본/주제]
${script}

[이미지 비율] ${state.aspectRatio}
[이미지 스타일] ${state.imageStyle}

반드시 아래 JSON 배열 형식으로만 응답하세요:
[
  {
    "scene": 1,
    "description": "장면 설명 (한국어, 1~2문장으로 영상에서 보여줄 내용)",
    "narration": "이 장면의 나레이션 텍스트 (한국어)",
    "imagePrompt": "영어로 된 상세한 이미지 생성 프롬프트. 스타일(${state.imageStyle}), 분위기, 구도, 색감, 조명을 구체적으로 포함. 텍스트나 글자는 절대 포함하지 않기. aspect ratio ${state.aspectRatio}"
  }
]

중요 규칙:
- 이미지 프롬프트는 반드시 영어로 작성
- 이미지에 텍스트/글자/숫자/워터마크가 들어가지 않도록 명시
- 각 장면이 시각적으로 다양하고 흥미로워야 함
- 나레이션은 자연스러운 한국어로 작성
- JSON만 출력하고 다른 텍스트는 절대 포함하지 마세요`;

    setProgress('progressFill', 30);

    const response = await callGeminiText(prompt);
    setProgress('progressFill', 70);

    // JSON 파싱 (다양한 형태 대응)
    let scenes;
    try {
      // 1차: 그대로 파싱 시도
      scenes = JSON.parse(response);
    } catch(e1) {
      try {
        // 2차: ```json ... ``` 마크다운 코드블록 제거 후 파싱
        let cleaned = response;
        // ```json 또는 ``` 블록 제거
        cleaned = cleaned.replace(/```json\s*/gi, '').replace(/```\s*/g, '');
        // 앞뒤 공백 제거
        cleaned = cleaned.trim();
        scenes = JSON.parse(cleaned);
      } catch(e2) {
        try {
          // 3차: 응답에서 JSON 배열 [ ... ] 부분만 추출
          const startIdx = response.indexOf('[');
          const endIdx = response.lastIndexOf(']');
          if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
            const jsonStr = response.substring(startIdx, endIdx + 1);
            scenes = JSON.parse(jsonStr);
          } else {
            throw new Error('JSON 배열을 찾을 수 없습니다');
          }
        } catch(e3) {
          console.error('파싱 실패. AI 원본 응답:', response.substring(0, 500));
          throw new Error('AI 응답 형식 오류. 다시 시도해주세요!');
        }
      }
    }

    if (!Array.isArray(scenes) || scenes.length === 0) {
      throw new Error('유효한 스토리보드가 생성되지 않았습니다');
    }

    // 상태 저장
    state.scenes = scenes.map(s => ({
      scene: s.scene,
      description: s.description,
      narration: s.narration,
      imagePrompt: s.imagePrompt,
      imageData: null,
      imageMime: null
    }));

    setProgress('progressFill', 100);
    setStatus('statusText', `✅ ${state.scenes.length}개 장면 스토리보드 완성!`);

    // UI 렌더링
    renderSceneList();
    $('#card-storyboard').classList.remove('hidden');
    $('#card-storyboard').scrollIntoView({ behavior: 'smooth' });

    showToast(`${state.scenes.length}개 장면 생성 완료!`, 'success');

  } catch(e) {
    console.error('스토리보드 생성 오류:', e);
    setStatus('statusText', `❌ 오류: ${e.message}`);
    showToast(e.message, 'error');
  } finally {
    state.isGenerating = false;
    $('#btnGenerate').disabled = false;
    $('#btnGenerate').textContent = '🚀 스토리보드 생성하기';
    setTimeout(() => {
      $('#progressBar').classList.add('hidden');
      setProgress('progressFill', 0);
    }, 2000);
  }
}

/* ===== 장면 목록 렌더링 ===== */
function renderSceneList() {
  const list = $('#sceneList');
  list.innerHTML = '';

  state.scenes.forEach((scene, i) => {
    const item = document.createElement('div');
    item.className = 'scene-item' + (scene.imageData ? ' done' : '');
    item.id = `scene-${i}`;

    const aspectMap = { '16:9': '16/9', '9:16': '9/16', '1:1': '1/1' };
    const ratio = aspectMap[state.aspectRatio] || '16/9';

    let imgContent;
    if (scene.imageData) {
      imgContent = `<img src="data:${scene.imageMime};base64,${scene.imageData}" alt="장면 ${i+1}">`;
    } else {
      imgContent = `<div class="placeholder">이미지 생성 대기 중</div>`;
    }

    item.innerHTML = `
      <div class="scene-header">
        <div class="scene-num">${i + 1}</div>
        <div class="scene-info">
          <div class="desc">${scene.description}</div>
          <div class="prompt-text">🎨 ${scene.imagePrompt.substring(0, 60)}...</div>
        </div>
      </div>
      <div class="scene-img-wrap" style="aspect-ratio:${ratio}">${imgContent}</div>
    `;

    // 개별 장면 클릭 → 이미지 재생성
    item.addEventListener('click', () => {
      if (!state.isGenerating) {
        regenerateSingleImage(i);
      }
    });

    list.appendChild(item);
  });
}

/* ===== 이미지 일괄 생성 ===== */
async function generateAllImages() {
  if (state.isGenerating) return;

  try {
    state.isGenerating = true;
    $('#btnGenerateImages').disabled = true;
    $('#btnGenerateImages').textContent = '⏳ 생성 중...';
    $('#imgProgressBar').classList.remove('hidden');

    const total = state.scenes.length;
    const remaining = state.scenes.filter(s => !s.imageData).length;
    const estMin = Math.ceil(remaining * 35 / 60);
    setStatus('imgStatusText', `🎨 ${remaining}개 이미지 생성 시작! (예상 약 ${estMin}분, 무료 API는 느려요)`);
    let completed = 0;

    for (let i = 0; i < total; i++) {
      // 이미 생성된 이미지는 건너뛰기
      if (state.scenes[i].imageData) {
        completed++;
        setProgress('imgProgressFill', (completed / total) * 100);
        continue;
      }

      // ★ 첫 번째 이미지 외에는 30초 대기 (무료 API 한도 보호)
      if (completed > 0) {
        const waitSec = 30;
        for (let s = waitSec; s > 0; s--) {
          setStatus('imgStatusText', `⏳ 다음 이미지까지 ${s}초 대기 중... (장면 ${i + 1}/${total} 대기)`);
          await sleep(1000);
        }
      }

      const sceneEl = $(`#scene-${i}`);
      sceneEl.className = 'scene-item generating';
      const imgWrap = sceneEl.querySelector('.scene-img-wrap');
      imgWrap.innerHTML = '<div class="spinner"></div>';

      setStatus('imgStatusText', `🎨 장면 ${i + 1}/${total} 이미지 생성 중...`);

      try {
        // 최대 3번 재시도
        let result = null;
        let lastErr = null;
        for (let attempt = 0; attempt < 3; attempt++) {
          try {
            result = await callGeminiImage(state.scenes[i].imagePrompt);
            break;
          } catch(retryErr) {
            lastErr = retryErr;
            if (retryErr.message.includes('한도') || retryErr.message.includes('429') || retryErr.message.includes('Resource')) {
              // API 한도 초과 → 60초씩 증가하며 대기
              const waitSec = (attempt + 1) * 60;
              for (let s = waitSec; s > 0; s--) {
                setStatus('imgStatusText', `⏳ API 한도 초과! ${s}초 후 재시도 (${attempt + 2}/3회차)`);
                await sleep(1000);
              }
            } else if (attempt < 2) {
              setStatus('imgStatusText', `⚠️ 장면 ${i + 1} 오류, 15초 후 재시도...`);
              await sleep(15000);
            }
          }
        }
        if (!result) throw lastErr;

        state.scenes[i].imageData = result.data;
        state.scenes[i].imageMime = result.mimeType;

        imgWrap.innerHTML = `<img src="data:${result.mimeType};base64,${result.data}" alt="장면 ${i+1}">`;
        sceneEl.className = 'scene-item done';
        showToast(`장면 ${i + 1} 생성 완료!`, 'success');

      } catch(e) {
        console.error(`장면 ${i+1} 이미지 생성 실패:`, e);
        imgWrap.innerHTML = `<div class="placeholder" style="color:var(--danger)">⚠️ 생성 실패<br><small>${e.message}</small><br><small>터치하면 재시도</small></div>`;
        sceneEl.className = 'scene-item error';
      }

      completed++;
      setProgress('imgProgressFill', (completed / total) * 100);
    }

    const successCount = state.scenes.filter(s => s.imageData).length;
    setStatus('imgStatusText', `✅ ${successCount}/${total}개 이미지 생성 완료!`);

    if (successCount > 0) {
      renderDownloadGrid();
      $('#card-download').classList.remove('hidden');
      $('#card-download').scrollIntoView({ behavior: 'smooth' });
    }

    showToast(`${successCount}개 이미지 생성 완료!`, 'success');

  } catch(e) {
    console.error('이미지 일괄 생성 오류:', e);
    setStatus('imgStatusText', `❌ 오류: ${e.message}`);
    showToast(e.message, 'error');
  } finally {
    state.isGenerating = false;
    $('#btnGenerateImages').disabled = false;
    $('#btnGenerateImages').textContent = '🎨 이미지 일괄 생성';
    setTimeout(() => {
      $('#imgProgressBar').classList.add('hidden');
      setProgress('imgProgressFill', 0);
    }, 3000);
  }
}

/* ===== 단일 이미지 재생성 ===== */
async function regenerateSingleImage(index) {
  if (state.isGenerating) return;

  const scene = state.scenes[index];
  if (!scene) return;

  try {
    state.isGenerating = true;
    const sceneEl = $(`#scene-${index}`);
    sceneEl.className = 'scene-item generating';
    const imgWrap = sceneEl.querySelector('.scene-img-wrap');
    imgWrap.innerHTML = '<div class="spinner"></div>';
    setStatus('imgStatusText', `🎨 장면 ${index + 1} 재생성 중...`);

    const result = await callGeminiImage(scene.imagePrompt);
    scene.imageData = result.data;
    scene.imageMime = result.mimeType;

    imgWrap.innerHTML = `<img src="data:${result.mimeType};base64,${result.data}" alt="장면 ${index+1}">`;
    sceneEl.className = 'scene-item done';

    setStatus('imgStatusText', `✅ 장면 ${index + 1} 재생성 완료!`);
    showToast(`장면 ${index + 1} 이미지 재생성 완료!`, 'success');

    // 다운로드 그리드 업데이트
    const successCount = state.scenes.filter(s => s.imageData).length;
    if (successCount > 0) {
      renderDownloadGrid();
      $('#card-download').classList.remove('hidden');
    }

  } catch(e) {
    console.error(`장면 ${index+1} 재생성 실패:`, e);
    const sceneEl = $(`#scene-${index}`);
    sceneEl.className = 'scene-item error';
    showToast(`재생성 실패: ${e.message}`, 'error');
  } finally {
    state.isGenerating = false;
  }
}

/* ===== 다운로드 그리드 렌더링 ===== */
function renderDownloadGrid() {
  const grid = $('#downloadGrid');
  grid.innerHTML = '';

  state.scenes.forEach((scene, i) => {
    if (!scene.imageData) return;

    const item = document.createElement('div');
    item.className = 'dl-item';
    item.innerHTML = `
      <img src="data:${scene.imageMime};base64,${scene.imageData}" alt="장면 ${i+1}">
      <div class="dl-label">장면 ${i + 1}</div>
    `;
    item.addEventListener('click', () => downloadSingle(i));
    grid.appendChild(item);
  });
}

/* ===== 개별 다운로드 ===== */
function downloadSingle(index) {
  try {
    const scene = state.scenes[index];
    if (!scene || !scene.imageData) return;

    const ext = scene.imageMime.includes('png') ? 'png' : 'jpg';
    const link = document.createElement('a');
    link.href = `data:${scene.imageMime};base64,${scene.imageData}`;
    link.download = `scene_${String(index + 1).padStart(2, '0')}.${ext}`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showToast(`장면 ${index + 1} 다운로드!`, 'success');
  } catch(e) {
    console.error('다운로드 오류:', e);
    showToast('다운로드 실패', 'error');
  }
}

/* ===== 전체 다운로드 ===== */
async function downloadAll() {
  try {
    const scenesWithImages = state.scenes.filter(s => s.imageData);
    if (scenesWithImages.length === 0) {
      showToast('다운로드할 이미지가 없어요', 'error');
      return;
    }

    showToast('이미지를 하나씩 다운로드합니다...', 'success');

    for (let i = 0; i < state.scenes.length; i++) {
      if (state.scenes[i].imageData) {
        downloadSingle(i);
        await sleep(500);
      }
    }
  } catch(e) {
    console.error('전체 다운로드 오류:', e);
    showToast('다운로드 중 오류 발생', 'error');
  }
}

/* ===== 편집 모달 ===== */
function openEditModal() {
  const body = $('#editModalBody');
  body.innerHTML = '';

  state.scenes.forEach((scene, i) => {
    const group = document.createElement('div');
    group.className = 'input-group';
    group.style.marginBottom = '16px';
    group.innerHTML = `
      <label style="color:var(--accent);font-weight:700">장면 ${i + 1}</label>
      <input type="text" value="${escapeHtml(scene.description)}" data-field="description" data-index="${i}" 
             placeholder="장면 설명" style="margin-bottom:6px">
      <textarea data-field="imagePrompt" data-index="${i}" rows="3"
                placeholder="이미지 프롬프트 (영어)" style="font-size:12px">${escapeHtml(scene.imagePrompt)}</textarea>
    `;
    body.appendChild(group);
  });

  $('#editModal').classList.add('active');
}

function closeEditModal() {
  $('#editModal').classList.remove('active');
}

function saveEdit() {
  try {
    $$('#editModalBody input[data-field="description"]').forEach(inp => {
      const idx = parseInt(inp.dataset.index);
      state.scenes[idx].description = inp.value;
    });
    $$('#editModalBody textarea[data-field="imagePrompt"]').forEach(ta => {
      const idx = parseInt(ta.dataset.index);
      state.scenes[idx].imagePrompt = ta.value;
    });

    renderSceneList();
    closeEditModal();
    showToast('스토리보드 수정 완료!', 'success');
  } catch(e) {
    console.error('편집 저장 오류:', e);
    showToast('저장 중 오류 발생', 'error');
  }
}

/* ===== 리셋 ===== */
function resetAll() {
  state.scenes = [];
  state.isGenerating = false;
  $('#card-storyboard').classList.add('hidden');
  $('#card-download').classList.add('hidden');
  $('#sceneList').innerHTML = '';
  $('#downloadGrid').innerHTML = '';
  $('#statusText').textContent = '';
  $('#imgStatusText').textContent = '';
  $('#scriptInput').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('초기화 완료!', 'success');
}

/* ===== 유틸리티 ===== */
function setProgress(id, value) {
  const el = $(`#${id}`);
  if (el) el.style.width = `${Math.min(100, Math.max(0, value))}%`;
}

function setStatus(id, text) {
  const el = $(`#${id}`);
  if (el) el.textContent = text;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg, type = '') {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}
</script>
</body>
</html>
